<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>

<title>Panel Personal — Diego Muñoz</title>
<meta name="description" content="Dashboard personal: finanzas, marca personal, empresa, redes, música, iglesia, familia y trabajo.">
<meta name="theme-color" content="#0d0f14">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <g id="i-empresa"><path d="M2.5 21h19"/><rect x="4.5" y="3" width="9.5" height="18" rx="1.5"/><path d="M14 9h4.5A1.5 1.5 0 0 1 20 10.5V21"/><path d="M7.5 7h3.5M7.5 11h3.5M7.5 15h3.5"/></g>

<!-- ─── Shell ────────────────────────────────────────────────────────── -->
<div class="shell">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand__mark">DM</div>
      <div class="brand__text">
        <strong>Panel Personal</strong>
        <span>Diego Muñoz</span>
      </div>
      <button class="icon-btn sidebar__close" id="navClose" aria-label="Cerrar menú">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-cerrar"/></svg>
      </button>
    </div>

    <nav class="nav" id="nav" aria-label="Navegación principal"></nav>

    <div class="sidebar__foot">
      <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
        <span class="theme-toggle__track">
          <span class="theme-toggle__thumb">
            <svg class="icon theme-toggle__sun" viewBox="0 0 24 24"><use href="#i-sol"/></svg>
            <svg class="icon theme-toggle__moon" viewBox="0 0 24 24"><use href="#i-luna"/></svg>
          </span>
        </span>
        <span class="theme-toggle__label">Modo oscuro</span>
      </button>
    </div>
  </aside>

  <div class="scrim" id="scrim" hidden></div>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn topbar__menu" id="navOpen" aria-label="Abrir menú">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-menu"/></svg>
      </button>
      <div class="topbar__title">
        <h1 id="viewTitle">Resumen</h1>
        <p id="viewSubtitle">Cargando…</p>
      </div>
      <div class="topbar__weather" id="topWeather" aria-live="polite"></div>
    </header>

    <main class="view" id="view" tabindex="-1"></main>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
